<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot-Navigable City — Sidewalk Passability Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        #map { width: 100%; height: 100vh; }

        .info-panel {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 16px;
            max-width: 320px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            font-size: 13px;
            line-height: 1.5;
        }
        .info-panel h2 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .info-panel .subtitle {
            color: #666;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 12px;
        }
        .stat {
            background: #f5f5f5;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
        }
        .stat .num {
            font-size: 20px;
            font-weight: 600;
        }
        .stat .lbl {
            font-size: 11px;
            color: #888;
        }

        .legend {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .filter-row {
            display: flex;
            gap: 6px;
        }
        .filter-btn {
            padding: 4px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 12px;
        }
        .filter-btn.active {
            background: #333;
            color: white;
            border-color: #333;
        }

        .frame-popup {
            min-width: 280px;
        }
        .frame-popup img {
            width: 100%;
            border-radius: 6px;
            margin-bottom: 6px;
        }
        .frame-popup .meta {
            font-size: 12px;
            color: #555;
            line-height: 1.6;
        }
        .frame-popup .score-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            color: white;
            font-weight: 600;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="info-panel">
        <h2>Sidewalk Passability Map</h2>
        <div class="subtitle">
            Robot-Navigable City — Silver Lake / Atwater Village, LA<br>
            293 analyzed frames across 30 walking sessions
        </div>

        <div class="stats">
            <div class="stat">
                <div class="num">86</div>
                <div class="lbl">Avg score</div>
            </div>
            <div class="stat">
                <div class="num" style="color:#22c55e">243</div>
                <div class="lbl">Comfortable</div>
            </div>
            <div class="stat">
                <div class="num" style="color:#eab308">23</div>
                <div class="lbl">Constrained</div>
            </div>
            <div class="stat">
                <div class="num" style="color:#ef4444">27</div>
                <div class="lbl">Failure</div>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Comfortable (&gt;150cm)</div>
            <div class="legend-item"><div class="legend-dot" style="background:#eab308"></div> Constrained (91-150cm)</div>
            <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Failure (&lt;91cm)</div>
        </div>

        <div class="filter-row">
            <button class="filter-btn active" onclick="filterPoints('all')">All</button>
            <button class="filter-btn" onclick="filterPoints('comfortable')">Comfortable</button>
            <button class="filter-btn" onclick="filterPoints('constrained')">Constrained</button>
            <button class="filter-btn" onclick="filterPoints('failure')">Failure</button>
        </div>
    </div>
